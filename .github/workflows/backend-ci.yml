name: Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: seyahat_db
          POSTGRES_USER: seyahat_user
          POSTGRES_PASSWORD: seyahat123
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U seyahat_user -d seyahat_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/seyahat_db
      DB_USERNAME: seyahat_user
      DB_PASSWORD: seyahat123
      JWT_SECRET: ci-secret-key-with-at-least-thirty-two-characters
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven

      - name: Build and test
        run: ./mvnw clean verify
